<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publisher - Sunucu Seçin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
  <link href="/css/dashboard.css" rel="stylesheet">
</head>
<body>
  <div class="guild-select-page">
    <header class="guild-select-header">
      <div style="display: flex; align-items: center; gap: 12px;">
        <div class="bot-logo">
          <i class="fas fa-robot"></i>
        </div>
        <span class="bot-name" style="font-size: 20px; font-weight: 600;">Publisher</span>
      </div>
      <div style="display: flex; align-items: center; gap: 16px;">
        <button class="theme-toggle" onclick="toggleTheme()">
          <i class="fas fa-moon"></i>
          <span>Tema</span>
        </button>
        <a href="#" class="premium-button">
          <i class="fas fa-crown"></i>
          <span>Premium</span>
        </a>
        <div class="user-menu" id="userMenu">
          <img src="" alt="" class="user-avatar" id="userAvatar">
          <span id="username" style="color: var(--text-primary);"></span>
          <a href="/auth/logout" class="btn btn-outline" style="padding: 6px 12px; font-size: 12px;">
            <i class="fas fa-sign-out-alt"></i> Cikis
          </a>
        </div>
      </div>
    </header>
    
    <div class="guild-select-content">
      <h1 class="guild-select-title">Sunucularınız</h1>
      <p class="guild-select-subtitle">Yönetmek istediğiniz sunucuyu seçin</p>
      
      <div class="loading-container" id="loadingContainer">
        <div class="loading-spinner"></div>
        <p>Sunucular yükleniyor...</p>
      </div>
      
      <div class="guilds-grid" id="guildsGrid" style="display: none;"></div>
      
      <div id="noGuilds" style="display: none; text-align: center; padding: 60px 20px;">
        <div style="width: 80px; height: 80px; margin: 0 auto 20px; border-radius: 50%; background: var(--bg-card); display: flex; align-items: center; justify-content: center;">
          <i class="fas fa-server" style="font-size: 32px; color: var(--text-muted);"></i>
        </div>
        <h3 style="margin-bottom: 8px;">Sunucu Bulunamadı</h3>
        <p style="color: var(--text-secondary); max-width: 400px; margin: 0 auto 24px;">Publisher Bot'un bulunduğu ve yönetim yetkiniz olan sunucu yok.</p>
        <a href="#" id="inviteBtn" class="btn btn-primary">
          <i class="fas fa-plus"></i> Botu Sunucuya Ekle
        </a>
      </div>
    </div>
  </div>
  
  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const currentTheme = html.getAttribute('data-theme');
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      html.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      
      const icon = document.querySelector('.theme-toggle i');
      icon.className = newTheme === 'light' ? 'fas fa-sun' : 'fas fa-moon';
    }
    
    function loadSavedTheme() {
      const savedTheme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
      const icon = document.querySelector('.theme-toggle i');
      if (icon) {
        icon.className = savedTheme === 'light' ? 'fas fa-sun' : 'fas fa-moon';
      }
    }
    
    async function init() {
      try {
        const userRes = await fetch('/api/user');
        if (!userRes.ok) {
          window.location.href = '/';
          return;
        }
        const user = await userRes.json();
        document.getElementById('username').textContent = user.username;
        document.getElementById('userAvatar').src = user.avatar 
          ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`
          : 'https://cdn.discordapp.com/embed/avatars/0.png';
        
        loadSavedTheme();
        await loadGuilds();
        await loadInviteUrl();
      } catch (error) {
        console.error('Init error:', error);
        window.location.href = '/';
      }
    }
    
    async function loadGuilds() {
      try {
        const res = await fetch('/api/guilds');
        const guilds = await res.json();
        
        document.getElementById('loadingContainer').style.display = 'none';
        
        if (guilds.length === 0) {
          document.getElementById('noGuilds').style.display = 'block';
          return;
        }
        
        const container = document.getElementById('guildsGrid');
        container.style.display = 'grid';
        
        container.innerHTML = guilds.map(guild => {
          const iconUrl = guild.icon 
            ? `https://cdn.discordapp.com/icons/${guild.id}/${guild.icon}.png`
            : null;
          
          return `
            <a href="/dashboard/${guild.id}" class="guild-card">
              <div class="guild-card-icon">
                ${iconUrl ? `<img src="${iconUrl}" alt="">` : guild.name.charAt(0)}
              </div>
              <div class="guild-card-info">
                <h3>${guild.name}</h3>
                <p><i class="fas fa-cog"></i> Yönet</p>
              </div>
            </a>
          `;
        }).join('');
      } catch (error) {
        console.error('Guilds error:', error);
        document.getElementById('loadingContainer').innerHTML = `
          <i class="fas fa-exclamation-circle" style="font-size: 40px; color: var(--accent-red); margin-bottom: 16px;"></i>
          <p style="color: var(--accent-red);">Sunucular yüklenemedi</p>
        `;
      }
    }
    
    async function loadInviteUrl() {
      try {
        const res = await fetch('/api/invite');
        const data = await res.json();
        document.getElementById('inviteBtn').href = data.url;
      } catch (error) {
        console.error('Invite URL error:', error);
      }
    }
    
    init();
  </script>
</body>
</html>
